<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('mountain_bg.png') no-repeat center bottom fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #000;
        }

        /* Modern Header & Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 60px;
            box-sizing: border-box;
            background: transparent;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
        }

        .nav-links a.nav-login {
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            background: transparent;
            display: inline-block;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .nav-links a.nav-login:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: #fff;
        }

        /* Main Center Flex Box */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 35px 35px;
            width: 100%;
            max-width: 330px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .login-card h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            color: #000;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            padding: 8px 30px 8px 5px;
            font-size: 14px;
            color: #000;
            box-sizing: border-box;
            outline: none;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .input-group input::placeholder {
            color: #222;
            font-weight: 600;
        }

        .input-group i {
            position: absolute;
            right: 0px;
            bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #74a1cb 0%, #4b7db0 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow 0.3s ease, opacity 0.3s ease;
            font-family: 'Montserrat', sans-serif;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .register-section {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #e0e0e0;
            font-weight: 500;
        }

        .register-section a {
            text-decoration: none;
            color: #fff;
            font-weight: 800;
            margin-left: 5px;
            letter-spacing: 0.5px;
        }

        .register-section a:hover {
            text-decoration: underline;
        }

        #step2, #step3 {
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #000;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

    <header>
        <nav class="nav-links" id="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#contact">Contact</a>
            <a href="login.html" class="nav-login">Login</a>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <h2>RESET PASSWORD</h2>

            <!-- Step 1: Request OTP -->
            <form id="step1-form">
                <div class="input-group">
                    <input type="text" name="email" id="email-input" placeholder="Registered Email" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <button type="submit" class="login-btn" id="btn-send-otp">Send OTP</button>
                <div class="loader" id="loader1"></div>
                <p id="msg1" style="font-size:12px; color:red; text-align:center;"></p>
            </form>

            <!-- Step 2: Verify OTP -->
            <form id="step2-form">
                <div id="step2">
                    <p style="font-size:12px; font-weight: 600; text-align:center; color:#333;">Enter OTP sent to your email</p>
                    <div class="input-group">
                        <input type="text" name="otp" id="otp-input" placeholder="Enter OTP" required>
                        <i class="fa-solid fa-key"></i>
                    </div>
                    <button type="submit" class="login-btn" id="btn-verify-otp">Verify OTP</button>
                    <div class="loader" id="loader2"></div>
                    <p id="msg2" style="font-size:12px; color:red; text-align:center;"></p>
                </div>
            </form>

            <!-- Step 3: Reset Password -->
            <form id="step3-form">
                <div id="step3">
                    <div class="input-group">
                        <input type="password" name="new_password" id="new-password" placeholder="New Password" required minlength="6">
                        <i class="fa-solid fa-eye-slash toggle-password" data-target="new-password" style="cursor: pointer;" title="Show/Hide Password"></i>
                    </div>
                    <div class="input-group">
                        <input type="password" id="confirm-password" placeholder="Confirm Password" required minlength="6">
                        <i class="fa-solid fa-eye-slash toggle-password" data-target="confirm-password" style="cursor: pointer;" title="Show/Hide Password"></i>
                    </div>
                    <button type="submit" class="login-btn" id="btn-reset-pass">Reset Password</button>
                    <div class="loader" id="loader3"></div>
                    <p id="msg3" style="font-size:12px; color:red; text-align:center;"></p>
                </div>
            </form>

            <div class="register-section">
                <span>Remembered your password?</span> <a href="login.html">Login</a>
            </div>
        </div>
    </main>

    <script>
        const step1Form = document.getElementById('step1-form');
        const step2Form = document.getElementById('step2-form');
        const step3Form = document.getElementById('step3-form');

        const step2Div = document.getElementById('step2');
        const step3Div = document.getElementById('step3');

        const btnSendOtp = document.getElementById('btn-send-otp');
        const btnVerifyOtp = document.getElementById('btn-verify-otp');
        const btnResetPass = document.getElementById('btn-reset-pass');

        const loader1 = document.getElementById('loader1');
        const loader2 = document.getElementById('loader2');
        const loader3 = document.getElementById('loader3');

        const msg1 = document.getElementById('msg1');
        const msg2 = document.getElementById('msg2');
        const msg3 = document.getElementById('msg3');

        let verifiedEmail = "";

        // Password Visibility Toggle
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const passwordInput = document.getElementById(targetId);
                
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // Handle Send OTP
        step1Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg1.innerText = "";
            const email = document.getElementById('email-input').value.trim();
            
            btnSendOtp.style.display = 'none';
            loader1.style.display = 'block';

            try {
                const params = new URLSearchParams();
                params.append("email", email);
                params.append("type", "reset_password");
                
                const response = await fetch("https://xeroxproject-backend-production.up.railway.app/send-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params
                });

                const data = await response.json();
                if (response.ok) {
                    verifiedEmail = email;
                    step1Form.style.display = 'none';
                    step2Div.style.display = 'block';
                } else {
                    msg1.innerText = data.error || "Failed to send OTP.";
                }
            } catch (err) {
                msg1.innerText = "Network error. Try again.";
            } finally {
                btnSendOtp.style.display = 'block';
                loader1.style.display = 'none';
            }
        });

        // Handle Verify OTP
        step2Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg2.innerText = "";
            const otpCode = document.getElementById('otp-input').value.trim();

            btnVerifyOtp.style.display = 'none';
            loader2.style.display = 'block';

            try {
                const params = new URLSearchParams();
                params.append("email", verifiedEmail);
                params.append("otp", otpCode);

                const response = await fetch("https://xeroxproject-backend-production.up.railway.app/verify-otp", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params
                });

                const data = await response.json();
                if (response.ok) {
                    step2Form.style.display = 'none';
                    step3Div.style.display = 'block';
                } else {
                    msg2.innerText = data.error || "Invalid OTP.";
                }
            } catch (err) {
                msg2.innerText = "Network error. Try again.";
            } finally {
                btnVerifyOtp.style.display = 'block';
                loader2.style.display = 'none';
            }
        });

        // Handle Reset Password
        step3Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg3.innerText = "";
            const newPass = document.getElementById('new-password').value;
            const confPass = document.getElementById('confirm-password').value;

            if (newPass !== confPass) {
                msg3.innerText = "Passwords do not match!";
                return;
            }

            btnResetPass.style.display = 'none';
            loader3.style.display = 'block';

            try {
                const params = new URLSearchParams();
                params.append("email", verifiedEmail);
                params.append("new_password", newPass);

                const response = await fetch("https://xeroxproject-backend-production.up.railway.app/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: params
                });

                const data = await response.json();
                if (response.ok) {
                    alert("Password successfully reset! Please login with your new password.");
                    window.location.href = "login.html";
                } else {
                    msg3.innerText = data.error || "Failed to reset password.";
                }
            } catch (err) {
                msg3.innerText = "Network error. Try again.";
            } finally {
                btnResetPass.style.display = 'block';
                loader3.style.display = 'none';
            }
        });
    </script>
</body>

</html>
