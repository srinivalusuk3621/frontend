<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status - XeroxHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f3f5f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 50px 40px; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 90%; }
        .icon { font-size: 60px; margin-bottom: 20px; }
        .icon.success { color: #2ecc71; animation: pop 0.5s ease; }
        .icon.failed { color: #e74c3c; animation: pop 0.5s ease; }
        .icon.loading { color: #3498db; animation: rotate 1.5s linear infinite; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; font-weight: 700; }
        p { color: #7f8c8d; font-size: 15px; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: inline-block; padding: 12px 25px; background: #3498db; color: white; text-decoration: none; border-radius: 8px; font-weight: 600; transition: background 0.3s; }
        .btn:hover { background: #2980b9; }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card" id="status-card">
    <div class="icon loading" id="status-icon"><i class="fa-solid fa-circle-notch"></i></div>
    <h1 id="status-title">Verifying Payment...</h1>
    <p id="status-message">Please wait while we confirm your transaction securely with Cashfree Gateway.</p>
    <a href="https://xeroxhub.vercel.app/user-dashboard.html" class="btn" style="display: none;" id="btn-home">Return to Dashboard</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('order_id');
    
    const icon = document.getElementById('status-icon');
    const title = document.getElementById('status-title');
    const msg = document.getElementById('status-message');
    const btn = document.getElementById('btn-home');

    if (!orderId) {
        icon.className = 'icon failed';
        icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
        title.innerText = 'Invalid Request';
        msg.innerText = 'No order ID was detected in the URL parameters.';
        btn.style.display = 'inline-block';
    } else {
        // Ping our secure verification servlet
        fetch('https://xeroxproject-backend-production.up.railway.app/verify-payment?orderId=' + encodeURIComponent(orderId))
        .then(res => res.json())
        .then(data => {
            if (data.status === 'SUCCESS') {
                icon.className = 'icon success';
                icon.innerHTML = '<i class="fa-solid fa-circle-check"></i>';
                title.innerText = 'Payment Successful!';
                msg.innerText = 'Your payment has been successfully captured. The order is now placed securely.';
            } else if (data.status === 'PENDING') {
                icon.className = 'icon loading';
                icon.innerHTML = '<i class="fa-solid fa-clock"></i>';
                title.innerText = 'Payment Pending';
                msg.innerText = 'Your payment is being processed. It may take a few minutes to be confirmed natively.';
            } else {
                icon.className = 'icon failed';
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark"></i>';
                title.innerText = 'Payment Failed';
                msg.innerText = 'Unfortunately, your payment could not be processed successfully. Please try placing the order again.';
            }
            btn.style.display = 'inline-block';
        })
        .catch(err => {
            icon.className = 'icon failed';
            icon.innerHTML = '<i class="fa-solid fa-cloud-arrow-down"></i>';
            title.innerText = 'Verification Failed';
            msg.innerText = 'Could not securely connect to verification server. Check your dashboard for order status later.';
            btn.style.display = 'inline-block';
        });
    }
</script>

</body>
</html>
