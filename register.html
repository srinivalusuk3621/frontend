<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - User Verification</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: url('mountain_bg.png') no-repeat center bottom fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #000;
        }

        /* Modern Header & Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 20px 60px;
            box-sizing: border-box;
            background: transparent;
            z-index: 1000;
        }

        .hamburger {
            display: none;
            background: transparent;
            border: none;
            color: #000;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.3s;
            outline: none;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease, transform 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #000;
            transition: width 0.3s ease;
        }

        .nav-links a:not(.nav-login):hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .nav-links a.nav-login {
            border: 2px solid rgba(255, 255, 255, 0.8);
            color: #fff;
            padding: 8px 20px;
            border-radius: 20px;
            background: transparent;
            display: inline-block;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        .nav-links a.nav-login:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-color: #fff;
        }

        /* Responsive Mobile Menu */
        @media (max-width: 768px) {
            header {
                padding: 15px 30px;
            }

            .hamburger {
                display: block;
            }

            .nav-links {
                position: absolute;
                top: 100%;
                right: 0;
                width: 250px;
                flex-direction: column;
                background: rgba(255, 255, 255, 0.527);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                padding: 30px 0;
                gap: 25px;
                border-bottom-left-radius: 15px;
                border-left: 1px solid rgba(0, 0, 0, 0.1);
                border-bottom: 1px solid rgba(0, 0, 0, 0.1);
                display: none;
                box-shadow: -5px 10px 30px rgba(0, 0, 0, 0.15);
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links a.nav-login {
                color: #000;
                border-color: rgba(0, 0, 0, 0.8);
            }

            .nav-links a.nav-login:hover {
                background: #000;
                color: #fff;
            }
        }

        /* Main Center Flex Box */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px 40px 20px; /* Space for absolute header */
        }

        /* Glassmorphism Card */
        .register-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 35px;
            width: 100%;
            max-width: 380px; /* Slightly wider than login for more inputs */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
        }

        .register-card h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            color: #000;
            letter-spacing: 1.2px;
            text-transform: uppercase;
        }

        /* Form Steps Animation */
        .form-step {
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            padding: 8px 30px 8px 5px;
            font-size: 14px;
            color: #000;
            box-sizing: border-box;
            outline: none;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-bottom-color: #4b7db0;
        }

        .input-group input.error-border {
            border-bottom-color: #e74c3c;
        }

        .input-group input::placeholder {
            color: #222;
            font-weight: 600;
        }

        .input-group i {
            position: absolute;
            right: 0px;
            bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        /* Error Label */
        .error-msg {
            color: #d32f2f;
            font-size: 11px;
            font-weight: 600;
            display: none;
            margin-top: 4px;
            text-align: left;
        }

        .primary-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #74a1cb 0%, #4b7db0 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow 0.3s ease, opacity 0.3s ease, transform 0.2s;
            font-family: 'Montserrat', sans-serif;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            margin-top: 15px;
            position: relative;
        }

        .primary-btn:hover {
            opacity: 0.9;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        .primary-btn:active {
            transform: translateY(1px);
        }
        
        .primary-btn:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            opacity: 0.7;
            box-shadow: none;
            transform: none;
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotation 1s linear infinite;
        }

        .btn-text.loading {
            visibility: hidden;
        }

        .primary-btn.is-loading .loader {
            display: block;
        }

        @keyframes rotation {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* OTP Specific Styling */
        .otp-container {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            gap: 8px;
        }

        .otp-box {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            border: 1px solid rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: #000;
            outline: none;
            transition: all 0.2s ease;
            font-family: 'Montserrat', sans-serif;
        }

        .otp-box:focus {
            border-color: #4b7db0;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 8px rgba(75, 125, 176, 0.3);
        }

        .resend-section {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            margin-top: 20px;
        }

        .resend-section span {
            color: #222;
        }

        .resend-btn {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            color: #4b7db0;
            font-weight: 800;
            cursor: pointer;
            font-size: 13px;
            padding: 8px 18px;
            font-family: inherit;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .resend-btn:hover:not(:disabled) {
            background: #4b7db0;
            color: #fff;
            border-color: #4b7db0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .resend-btn:disabled {
            background: rgba(255, 255, 255, 0.2);
            color: #444;
            cursor: not-allowed;
            border-color: rgba(0, 0, 0, 0.15);
            box-shadow: none;
        }

        .back-link {
            text-align: left;
            margin-bottom: 20px;
        }

        .back-link a {
            color: #000;
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #4b7db0;
        }

        .login-section {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #444;
            font-weight: 600;
        }

        .login-section a {
            text-decoration: none;
            color: #111;
            font-weight: 800;
            margin-left: 5px;
            letter-spacing: 0.5px;
        }

        .login-section a:hover {
            text-decoration: underline;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.2);
            transition: background 0.3s;
        }

        .step-dot.active {
            background: #4b7db0;
            box-shadow: 0 0 5px rgba(75, 125, 176, 0.5);
        }

        .success-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .success-overlay i {
            font-size: 50px;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .success-overlay p {
            font-size: 18px;
            font-weight: 800;
            color: #000;
            margin: 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .register-card {
                padding: 25px 20px;
                width: 90%;
            }
            .register-card h2 {
                font-size: 18px;
            }
            .otp-box {
                width: 38px;
                height: 45px;
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <header>
        <button class="hamburger" id="hamburger">
            <i class="fa-solid fa-bars"></i>
        </button>
        <nav class="nav-links" id="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#contact">Contact</a>
            <a href="login.html" class="nav-login">Login</a>
        </nav>
    </header>

    <main>
        <div class="register-card">
            
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
            </div>

            <!-- SUCCESS OVERLAY -->
            <div class="success-overlay" id="success-overlay">
                <i class="fa-solid fa-circle-check"></i>
                <p>Registration Successful!</p>
                <div style="font-size: 12px; margin-top: 10px; color: #555;">Redirecting to login...</div>
            </div>

            <!-- STEP 1: REGISTRATION DETAILS -->
            <div id="step-1" class="form-step active">
                <h2>CREATE ACCOUNT</h2>
                <form id="reg-form" onsubmit="handleSendOTP(event)">
                    <div class="input-group">
                        <input type="text" id="fullname" placeholder="Full Name" required>
                        <i class="fa-regular fa-user"></i>
                        <div class="error-msg" id="err-fullname"></div>
                    </div>

                    <div class="input-group">
                        <input type="email" id="email" placeholder="Email Address" required>
                        <i class="fa-regular fa-envelope"></i>
                        <div class="error-msg" id="err-email"></div>
                    </div>

                    <div class="input-group">
                        <input type="tel" id="phone" placeholder="Phone Number (10 digits)" maxlength="10" required>
                        <i class="fa-solid fa-phone"></i>
                        <div class="error-msg" id="err-phone"></div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="password" placeholder="Password" minlength="6" required>
                        <i class="fa-solid fa-eye-slash toggle-password" style="cursor: pointer;" title="Show/Hide Password"></i>
                        <div class="error-msg" id="err-password"></div>
                    </div>

                    <div class="input-group">
                        <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                        <i class="fa-solid fa-eye-slash toggle-password" style="cursor: pointer;" title="Show/Hide Password"></i>
                        <div class="error-msg" id="err-confirm-password"></div>
                    </div>

                    <button type="submit" class="primary-btn" id="btn-send-otp">
                        <span class="btn-text">Send OTP</span>
                        <div class="loader"></div>
                    </button>

                    <div class="login-section">
                        <span>Already have an account?</span> <a href="login.html">Login</a>
                    </div>
                </form>
            </div>

            <!-- STEP 2: OTP VERIFICATION -->
            <div id="step-2" class="form-step">
                <div class="back-link">
                    <a href="javascript:void(0)" onclick="goBackToStep1()"><i class="fa-solid fa-arrow-left"></i> Change Details</a>
                </div>
                <h2>VERIFY OTP</h2>
                <p style="text-align: center; font-size: 13px; font-weight: 600; margin-bottom: 20px; color: #333;">
                    Enter the 6-digit code sent to <br><span id="display-contact" style="color:#000; font-weight:800;"></span>
                </p>

                <form id="otp-form" onsubmit="handleVerifyOTP(event)">
                    <div class="otp-container" id="otp-inputs">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                        <input type="text" class="otp-box" maxlength="1" required autocomplete="off">
                    </div>
                    <div class="error-msg" id="err-otp" style="text-align: center; margin-bottom: 10px;"></div>

                    <button type="submit" class="primary-btn" id="btn-verify-otp">
                        <span class="btn-text">Verify & Register</span>
                        <div class="loader"></div>
                    </button>

                    <div class="resend-section">
                        <span>Didn't receive code?</span> <br>
                        <button type="button" class="resend-btn" id="btn-resend" onclick="resendOTP()" disabled>
                            Resend OTP in <span id="timer">60</span>s
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <script>
        // --- Hamburger Menu Logic ---
        const hamburger = document.getElementById('hamburger');
        const navLinks = document.getElementById('nav-links');

        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            const icon = hamburger.querySelector('i');
            if (navLinks.classList.contains('active')) {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            } else {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            }
        });

        // --- Password Visibility Toggle ---
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function () {
                const input = this.previousElementSibling;
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
        });

        // --- Validation & OTP Flow State ---
        let resendTimerInterval;
        let selectedContact = "";

        function showError(inputId, msg) {
            const input = document.getElementById(inputId);
            const errDiv = document.getElementById('err-' + inputId);
            input.classList.add('error-border');
            errDiv.textContent = msg;
            errDiv.style.display = 'block';
        }

        function clearErrors() {
            document.querySelectorAll('input').forEach(inp => inp.classList.remove('error-border'));
            document.querySelectorAll('.error-msg').forEach(err => {
                err.style.display = 'none';
                err.textContent = '';
            });
        }

        async function handleSendOTP(e) {
            e.preventDefault();
            clearErrors();
            let isValid = true;

            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            // Basic Validation
            if (phone.length !== 10 || isNaN(phone)) {
                showError('phone', 'Please enter a valid 10-digit phone number');
                isValid = false;
            }
            if (pass.length < 6) {
                showError('password', 'Password must be at least 6 characters');
                isValid = false;
            }
            if (pass !== confirmPass) {
                showError('confirm-password', 'Passwords do not match');
                isValid = false;
            }

            if (!isValid) return;

            // Simulate API Call for Send OTP
            const btn = document.getElementById('btn-send-otp');
            btn.classList.add('is-loading');
            btn.disabled = true;

            try {
                // Check if user already exists
                const checkRes = await fetch('https://xeroxproject-backend-production.up.railway.app/checkUser?email=' + encodeURIComponent(email));
                const checkData = await checkRes.json();
                
                if (checkData.exists) {
                    showError('email', 'Email already exists! Please login instead.');
                    btn.classList.remove('is-loading');
                    btn.disabled = false;
                    return;
                }

                // Call actual backend to send OTP
                const formData = new URLSearchParams();
                formData.append('email', email);
                
                const otpRes = await fetch('https://xeroxproject-backend-production.up.railway.app/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const otpData = await otpRes.json();
                
                if (!otpRes.ok || !otpData.success) {
                    throw new Error(otpData.error || 'Failed to send OTP.');
                }
                
                selectedContact = email; // Or mask the email: email.replace(/(.{2})(.*)(?=@)/, "$1***")
                document.getElementById('display-contact').textContent = selectedContact;
                
                // Show Step 2
                document.getElementById('step-1').classList.remove('active');
                document.getElementById('step-2').classList.add('active');
                document.getElementById('dot-1').classList.remove('active');
                document.getElementById('dot-2').classList.add('active');
                
                startResendTimer();
                // Focus first OTP box
                document.querySelector('.otp-box').focus();

            } catch (err) {
                alert(err.message || 'Error occurred while sending OTP');
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        }

        function goBackToStep1() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('dot-2').classList.remove('active');
            document.getElementById('dot-1').classList.add('active');
            clearInterval(resendTimerInterval);
        }

        // --- OTP Input Auto-Advance Logic ---
        const otpInputs = document.querySelectorAll('.otp-box');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                // Allow only numbers
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
                for(let i=0; i<pasteData.length; i++) {
                    if (otpInputs[i]) {
                        otpInputs[i].value = pasteData[i];
                        if (i < 5) otpInputs[i+1].focus();
                    }
                }
            });
        });

        // --- Resend Timer ---
        function startResendTimer() {
            let timeLeft = 60;
            const timerSpan = document.getElementById('timer');
            const resendBtn = document.getElementById('btn-resend');
            
            resendBtn.disabled = true;
            resendBtn.innerHTML = `Resend OTP in <span id="timer">${timeLeft}</span>s`;

            clearInterval(resendTimerInterval);
            resendTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(resendTimerInterval);
                    resendBtn.disabled = false;
                    resendBtn.innerHTML = 'Resend OTP Now';
                }
            }, 1000);
        }

        async function resendOTP() {
            startResendTimer();
            // >>> BACKEND INTEGRATION: Replace with your actual Resend OTP API
            console.log("Resending OTP...");
        }

        // --- Verify OTP & Register ---
        async function handleVerifyOTP(e) {
            e.preventDefault();
            const errOtp = document.getElementById('err-otp');
            errOtp.style.display = 'none';

            let otpCode = "";
            otpInputs.forEach(input => otpCode += input.value);

            if (otpCode.length < 6) {
                errOtp.textContent = "Please enter the complete 6-digit OTP";
                errOtp.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btn-verify-otp');
            btn.classList.add('is-loading');
            btn.disabled = true;

            try {
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('password').value;
                const fullname = document.getElementById('fullname').value.trim();
                const phone = document.getElementById('phone').value.trim();

                // 1. Verify OTP First
                const otpFormData = new URLSearchParams();
                otpFormData.append('email', email);
                otpFormData.append('otp', otpCode);
                
                const otpRes = await fetch('https://xeroxproject-backend-production.up.railway.app/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: otpFormData
                });
                
                const otpData = await otpRes.json();
                if (!otpRes.ok || !otpData.success) {
                    throw new Error(otpData.error || 'Invalid OTP');
                }

                // 2. If OTP is valid, proceed with registration
                const params = new URLSearchParams();
                params.append('email', email);
                params.append('password', pass);
                params.append('fullname', fullname);
                params.append('phone', phone);
                
                const response = await fetch('https://xeroxproject-backend-production.up.railway.app/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: params
                });

                const textResult = await response.text();

                if (!response.ok) {
                    // Extract HTML error message from server
                    let errorMsg = textResult.replace(/<[^>]*>?/gm, '').trim(); 
                    throw new Error(errorMsg || ("Cannot reach backend (HTTP " + response.status + ")"));
                }

                // If somehow status 200 but includes an embedded logical form error:
                if (textResult.includes("Registration Failed") || textResult.includes("Error:") || textResult.includes("You already have an account")) {
                    let errorMsg = textResult.replace(/<[^>]*>?/gm, '').trim(); 
                    throw new Error(errorMsg || "Database Registration Failed");
                }

                // Success
                document.getElementById('success-overlay').style.display = 'flex';
                
                // Redirect after success
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2500);

            } catch (err) {
                errOtp.textContent = err.message || "Invalid OTP. Please try again.";
                errOtp.style.display = 'block';
                otpInputs.forEach(i => i.value = ''); // clear inputs on error
                otpInputs[0].focus();
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
